<style>

<body>
<div class="head">
  <h1>📋 Brain全文コピー</h1>

</div>
<textarea class="card" id="txt" readonly></textarea>
<div class="hint">効かない時は、上の文を長押し →「すべて選択」→「コピー」でもOK</div>
<div class="bar">

<div class="toast" id="toast">コピーした！ChatGPTに長押しで貼り付け</div>
<script>
const T = `今日も、自分の時間はゼロだった。

——そんな夜が、いつまで続きますか。

僕は農家です。

朝から晩までトラックを運転して、
帰れば 子ども・夕食・お風呂・寝かしつけ。

気づけば、夜9時。

やりたかった発信も、作りたかった資料も、
今日も"あとで"のまま消えました。

そんな毎日を、僕は変えました。

やり方を変えたんじゃありません。

「打つ」のを、やめたんです。

今の僕は、トラックを運転しながら仕事が終わります。

声で言うだけ。あとはAIが作ってくれる。

この教材が売っているのは「音声入力のやり方」ではありません。

売っているのは——

あなたに返ってくる【時間】と、
「自分の人生を自分で動かしている」という【自由】です。

━━━━━━━━━━━━

■ こんな毎日、ありませんか

・言いたいこと、やりたいことは、頭にある

・なのに「打つ」のが面倒で、発信も資料も止まる

・日中は本業。夜は家族。机に向かう時間がない

・「時間ができたらやろう」が、もう何ヶ月も続いている

1つでも当てはまるなら、この先を読んでください。

これは3ヶ月前の、僕そのものです。

━━━━━━━━━━━━

■ はっきり言います。悪いのは、あなたじゃない

「続かないのは、意志が弱いから」

「発信できないのは、やる気がないから」

——違います。

悪いのは、あなたじゃなくて「打つ」というやり方です。

忙しい人の1日に、
"机に向かって文字を打つ時間"なんて、最初からないんです。

ないものを、根性でひねり出そうとするから、続かない。

→ だから、やり方ごと捨てます。
　 打たない。喋るだけ。

━━━━━━━━━━━━

■ ビフォー → アフター（僕に起きたこと）

《3ヶ月前の僕》

・運転中は、何もできないただの移動時間

・帰宅後は、家族の時間で仕事はできない

・頭に浮かんだ企画は、打つ前に消えていく

・「時間がない」が口ぐせ

《今の僕》

・運転中に、声で仕事の指示が終わっている

・寝かしつけのあと、机に向かわなくても成果物ができている

・頭に浮かんだことが、その日のうちに形になる

・浮いた時間は、子どもと、自分のために使う

変わったのは、たった1つ。

「打つ」を「喋る」に変えた。それだけです。

━━━━━━━━━━━━

■ なぜ、あなたにもできると言い切れるのか

これ全部、僕がAIを触り始めて「たった3ヶ月」でやったことだからです。

3ヶ月前の僕は、ゼロでした。

エンジニアでもない。専門家でもない。

パソコンの前に座る時間すら、ない。

そんな僕でもできた理由は、才能じゃありません。

"声だけで仕事が完成する仕組み"を先に作ったからです。

そして——

この教材そのものが、声だけで生まれました。

運転しながら、喋って作った商品。これが何よりの証拠です。

━━━━━━━━━━━━

■ 3ヶ月で、実際にできたもの（全部本物）

《本業の農業で、40件以上》

・出荷の数量管理 → 声とAIで回る仕組みに

・レシートの経理 → 手で打ち込む作業がゼロに

・農薬の在庫 → 足りなくなる前にAIが教えてくれる

・農業まんが → 毎日、自動で投稿される

……ぜんぶ、農家の僕が声で作りました。

《農業の外でも》

・Xの投稿が自動で出る仕組み

・売るためのページ（LP）

・動画、スライド

・24時間そばにいてくれるAIの相棒

→ 「農家だからできた」ではありません。
　 農家"でも"できた、が正しいです。

━━━━━━━━━━━━

■ 一番疑われる所を、実物で見せます

「声だけで、本当にそんな物が作れるの？」

——はい。実際の記録がこれです。

・僕の声
「このスクショに、赤枠・モザイク・矢印をつけるツール作って」

・AIに渡った指示（全文公開）
「画像に 赤枠/矢印/モザイク/ペン/文字 を付けられるWeb注釈ツール。
　スマホで使えて、なぞった所は自動でぼかし、保存もコピーもできる、見た目はかっこよく」

・できたもの
＝ 実際に動くWebツール（URLあり・本編で公開）

声から完成まで、僕がやったのは「喋る」だけ。

本編では、この
声（全文）→ AIへの指示（全文）→ AIの答え → 直した所 → 完成物
を、隠さず"全文"で公開します。

→ まねすれば、同じことが起きる。
　 それが「全文公開」の意味です。

━━━━━━━━━━━━

■ この教材で、7日後のあなた

・毎日1本、発信が"声だけ"で出せている

・提案や説明の文章を、喋るだけで作れている

・AIへの頼み方が分かって、一発で通っている

・「打つのが面倒で止まる」感覚が、消えている

できないことは、約束しません。

この4つは、7日で届く距離です。

━━━━━━━━━━━━

■ 始め方は2タイプ（迷ったらB）

《タイプA：自分でやる》

・① スマホに、声で話せるAI（Claude等）を入れる

・② 「音声入力」をオンにする

・③ 作りたいことを、声で言う

・④ 出てきたものを使う → 直しも声で

・⑤ 慣れたら、各章の"声のかけ方"を1つずつ

《タイプB：このBrainを丸ごとコピーして、AIに渡す（一番ラク）》

・① このBrainを"全文コピー"する

・② AIに貼り付けて
　「この通りに、私の環境で使えるようにして」と頼む

・③ AIが手順を組んで、案内してくれる

・④ あなたは、案内どおりに進めるだけ

→ 覚えなくていい。任せていい。
　 それがこの教材の設計です。

━━━━━━━━━━━━

■ 第1章 なぜ「声」なのか

打つより、話す方が ずっと速い。

でも、本当の理由は速さじゃありません。

「打つ時間」は作らないと生まれないけど、
「喋れる時間」は、あなたの1日にもう転がっているからです。

運転中。歩いてる時。作業の合間。

その"すきま"が、全部仕事の時間に変わります。

→ 正直に言うと、向かない場面もあります
　（表計算・数式・細かい修正）。

→ だから「全部やめろ」ではなく
　「止まりやすい所を、声で進める」が正解です。

━━━━━━━━━━━━

■ 第2章 準備は5分（スマホ1台・無料）

むずかしい設定は、ありません。

声でメモ → AIに渡す → 整った文章が返ってくる。

まずこれを1回。開始5分でできます。

最初の1回で「あ、もう打たなくていいんだ」と体で分かります。

━━━━━━━━━━━━

■ 第3章 一番やさしいスタート

完璧な指示は、いりません。

まずは、資料や写真をAIに入れて
「これ、どうすればいい？」と声で聞くだけ。

慣れたら「これを要約して」と言うだけ。

一気に喋って崩れてもOK。

→ 完璧に喋ろうとして止まるより、
　 まず雑に全部 → AIで整える、が正解です。

━━━━━━━━━━━━

■ 第4章 発信を、声で

AIへの頼み方（例）：
「私が喋ったメモの誤字を直して、X投稿1本（140字）に。
　結論を先頭、理由は箇条書き、最後に一言。煽らず自然に →（声）」

実例：
声「白沢ハウス2、そろそろ花芽つきそう。今日の見回りメモをX1本に」

→ 完成「今朝の見回りで、白沢2に花芽の兆し。
　　　　焦って早めるより"待つ"のも農家の判断…」

そのまま投稿できます。

→ 発信が止まらない人になる、一番の近道です。

━━━━━━━━━━━━

■ 第5章 資料・提案を、声で

AIへの頼み方（例）：
「この喋りを、現状→課題→提案→効果→費用 の提案書1枚に →（声）」

実例：
声「キャベツ全量買取の提案。現状と、先方の得を1枚に」

→ 提案書1枚が完成。

コツは、相手の"得"を1文入れて喋ることです。

━━━━━━━━━━━━

■ 第6章 頼みごと・段取りを、声で

AIへの頼み方（例）：
「私の声を、AIや人が迷わない頼み方に。
　誰が・何を・いつまでに・できた合図、の4点で →（声）」

実例：
声「スクショに赤枠・モザイク・矢印を付けるツール作って」

→ AIが迷わない形に整って

→ 実際に動くツールが完成（＝さっきの実物です）。

━━━━━━━━━━━━

■ 第7章 記録・議事録を、声で

声 → まとめ → 保存。

打ち合わせも、思いつきも、"財産"に変わります。

全部残さなくていい。

→ 「決まった事」と「次やる事」だけに絞るのがコツです。

━━━━━━━━━━━━

■ 第8章 声で"考えながら"仕事する

声のすごさは、頭の中をそのまま外に出せることです。

生の声
「この商品どう売るか…5,000円は高いかな、いや、記録があれば…」

→ この"迷いの声"が、そのまま教材の中身になりました。

考える時間が、そのまま作る時間になる。

これが、打つ仕事との一番の違いです。

━━━━━━━━━━━━

■ 第9章 声1つを、AIで何倍にもする

声の素材1つ → AIが
「投稿1本＋まとめ＋タイトル3案＋関連ネタ5つ」を一度に出す。

無料のAIは、役割で覚えます：

・文章を整える ＝ ChatGPT や Claude

・声にする ＝ VOICEVOX（無料）

・絵にする ＝ 無料の画像AI

→ 道具の名前は変わっても、この"役割"は一生使えます。

━━━━━━━━━━━━

■ 第10章 その先 ── AIを"装備"する

ここまでで、あなたは「AIを装備する」土台が手に入ります。

僕はこの土台の上で、
出荷管理も、経理も、毎日の投稿も、声だけで回しています。

運転中の声だけから始まった土台に、
あなたも今日から立てます。

━━━━━━━━━━━━

■ 7日間ロードマップ

・1日目：音声入力の設定（5分）＋"声でメモ→AIで整える"を1回

・2日目：声でX投稿を1本

・3日目：声で提案・説明文を1枚

・4日目：声でAI/人への頼みごとを1本

・5日目：声で記録・議事録を1本

・6日目：声1つ → AIで複数に展開

・7日目：声 → AIで動画 or 教材を1本

→ この7日で「毎日1本、声だけで出せる」あなたになります。

━━━━━━━━━━━━

■ 想像してください。1ヶ月後のあなたを

朝、車の中で今日の発信が終わっている。

昼、作業の合間の独り言が、提案書になっている。

夜9時、子どもを寝かしつけたあと——

もう、机に向かわなくていい。

「時間ができたらやろう」と言わなくなったあなたは、
浮いた時間で、何をしますか。

家族と過ごしてもいい。

新しい仕事を仕込んでもいい。

ただ、休んでもいい。

→ その選べる状態のことを、僕は【自由】と呼んでいます。

━━━━━━━━━━━━

■ 特典（最後まで走り切るための3つ）

・特典A ＝ 声かけ & AIプロンプト集
　（各章の"頼み方"を、コピペで使える形に）

・特典B ＝ 実ログ完全版
　（音声全文・AIへの指示全文・出力・直した所・完成物URL）

・特典C ＝ 声 → AI 無料接続の手順書
　（お金をかけずに始める道すじ）

→ 「読んで終わり」にならない設計です。

━━━━━━━━━━━━

■ 正直に言うと、5,000円は"安すぎ"ます

この教材で渡すのは、"やり方"だけじゃありません。

・僕が3ヶ月でやった、実装40件超の"型"

・声 → AI → 完成 までの全文ログ（隠さず、全部）

・AIを"装備"する土台（ここから、何でも作れる）

・特典3つ（プロンプト集／実ログ完全版／無料接続の手順）

考えてみてください。

提案書1枚、投稿1本、ツール1個を 外注したら、いくらかかりますか。

しかも あなたは今日も、"あとで"に回した発信・提案・チャンスを、
毎日 消し続けています。

この教材が返すのは、その"毎日"です。

→ たった1回、声で通した提案や発信で、5,000円はもう戻ってきます。

→ そのあとは、一生 使える。

道具にお金を払うんじゃない。あなたの時間を、買い戻すんです。

——だから、5,000円は 安すぎる。

━━━━━━━━━━━━

■ 最後に

3ヶ月前、僕は「時間がない」が口ぐせの、ただの農家でした。

今も忙しさは変わりません。

でも、仕事は終わるようになりました。

あなたの1日にも、"喋れる時間"はもう転がっています。

それを仕事に変えるか、今日も流すか。

決めるのに、キーボードはいりません。

→ 声だけで変わった僕が、声だけで変わる道を渡します。
　 次は、あなたの番です。`;
const ta=document.getElementById('txt'); ta.value=T;
function toast(msg){const t=document.getElementById('toast');if(msg)t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2100);}
document.getElementById('copy').onclick=async()=>{
  let ok=false;
  // 1) textareaを選択(スマホ最重要・execCommandの前提)
  ta.readOnly=false; ta.focus(); ta.select(); try{ta.setSelectionRange(0,999999);}catch(e){}
  // 2) clipboard API（HTTPS+ジェスチャで最優先）
  try{ await navigator.clipboard.writeText(T); ok=true; }catch(e){}
  // 3) execCommand（webview用フォールバック）
  if(!ok){ try{ ok=document.execCommand('copy'); }catch(e){} }
  ta.readOnly=true;
  if(ok){ toast('コピーした！ChatGPTに長押しで貼り付け'); }
  else { toast('上の文を長押し→全選択→コピーしてね'); }
};
</script>
