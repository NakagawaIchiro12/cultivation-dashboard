<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Brain全文コピー｜品質チェッカーへ</title>
<style>
  :root{--bg:#0f1216;--card:#1a1f27;--line:#2a313c;--txt:#e9edf3;--sub:#93a0b4;--ac:#22c55e}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--txt);font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",system-ui,sans-serif;padding:16px;padding-bottom:100px;line-height:1.7}
  .head{text-align:center;margin:8px 0 16px}
  .head h1{font-size:17px;font-weight:800}
  .head p{font-size:12.5px;color:var(--sub);margin-top:6px;line-height:1.6}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;font-size:13px;white-space:pre-wrap;word-break:break-word;height:60vh;overflow:auto;-webkit-user-select:text;user-select:text;width:100%;color:var(--txt);font-family:inherit;line-height:1.7;resize:none;display:block}
  .hint{font-size:12px;color:var(--sub);text-align:center;margin-top:10px;line-height:1.6}
  .bar{position:fixed;left:0;right:0;bottom:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(transparent,#0f1216 22%);display:flex;gap:10px}
  .btn{flex:1;border:none;border-radius:13px;padding:16px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;background:linear-gradient(135deg,var(--ac),#16a34a);color:#fff;box-shadow:0 6px 20px rgba(34,197,94,.35)}
  .btn:active{transform:translateY(1px)}
  .btn.sub{background:var(--card);color:var(--txt);border:1px solid var(--line);flex:0 0 auto;box-shadow:none;padding:16px 18px}
  .toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);background:#000d;border:1px solid var(--line);color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;font-weight:800;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="head">
  <h1>📋 Brain全文コピー</h1>
  <p>下の「全文コピー」を1タップ →<br>ChatGPTの「ブレイン品質チェッカー」に貼り付け（長押し→ペースト）</p>
</div>
<textarea class="card" id="txt" readonly></textarea>
<div class="hint">効かない時は、上の文を長押し →「すべて選択」→「コピー」でもOK</div>
<div class="bar">
  <button class="btn sub" onclick="location.href='https://chatgpt.com'">GPTを開く</button>
  <button class="btn" id="copy">📋 全文コピー</button>
</div>
<div class="toast" id="toast">コピーした！ChatGPTに長押しで貼り付け</div>
<script>
const T = `今日もあなたの「1時間」が、
ゴミ箱に捨てられました。

運転中の、あの時間です。

ハンドルを握って、
何も生み出せないまま流れていく時間。

夜、子どもを寝かしつけて、
「さあやるか」と思った瞬間に
まぶたが落ちる時間。

僕も、ずっとそうでした。

僕は農家です。

朝から晩まで畑。
移動は毎日、車。
夜は子どもの夕食、風呂、寝かしつけ。
気づけば夜9時。

机に向かえる「まとまった時間」は、ゼロ。

だから僕は、あきらめる代わりに
こう決めました。

「打つのをやめる。ぜんぶ声でやる」

━━━━━━━━━━━━

■ この教材、キーボードで書いていません

先に一番大事な証拠を出します。

このBrain自体、声だけで作りました。

運転中と、寝かしつけのあとの声で。

「声で仕事が完成する」という商品を
声で作って、いまあなたに届けている。

これ以上の証拠は、ないと思います。

━━━━━━━━━━━━

■ 売っているのは「音声入力」ではありません

道具の話なら、無料の記事で足ります。

僕が売るのは、

【時間】と【自由】です。

・運転中が「移動時間」から「仕事が終わる時間」に変わる
・夜、机に向かわなくても「成果物ができている」

つまり、死んでいた時間が、生き返る。

考えてみてください。

もしあなたが1日30分、
「打つこと」に使っているなら。

1年で180時間。
丸7日ぶんの人生が、
指先の作業に消えています。

このBrainが回収しにいくのは、その180時間です。

━━━━━━━━━━━━

■ こんな「3つの面倒」、ありませんか

→ スマホでポチポチ打つのが面倒。長文なんて無理
→ AIに何て指示すればいいか分からない
→ マニュアルを読むのがそもそもしんどい

ひとつでも当てはまるなら、このまま読んでください。

そして先に言っておきます。

悪いのは、あなたじゃない。

「打つ」というやり方が悪いんです。

話すスピードは、打つより圧倒的に速い。
あなたは毎日、しゃべれています。
つまり、能力はもう持っています。

使う場所を変えるだけです。

━━━━━━━━━━━━

■ Before → After

《Before》
・運転中 → ただの移動時間
・夜 → 疲れて机に向かえない
・AI → 何を打てばいいか分からず放置

《After》
・運転中 → 着いた頃には仕事がひとつ終わっている
・夜 → 机に向かってないのに成果物ができている
・AI → 声でひとこと言えば動く「部下」になる

━━━━━━━━━━━━

■ なんでお前にそれが言える？

正直に言います。

僕のAI歴は、たった3ヶ月です。

3ヶ月前はゼロ。
プログラミング経験もなし。
ただの農家。

その僕が、声だけで
合計40件超の仕組みをゼロから実装しました。

《農業で》
・出荷数量の管理
・レシート経理の手入力ゼロ化
・農薬在庫の予測
・農業まんがの毎日自動投稿

《農業の外で》
・Xの自動投稿
・LP
・動画
・スライド
・常駐AI

天才だからできた、じゃありません。

「声でAIを動かす型」を持っていたからできた。

その型を、このBrainに全部置きました。

━━━━━━━━━━━━

■ 実物を見せます（加工なしの実ログ）

僕が車で、こう言いました。

「スクショに赤枠とモザイクと矢印つけるツール作って」

→ 動くWebツールが完成しました。
（URLは本編に置いています。触れます）

しかも本編では、

声 → AIへの指示 → 出力 → 修正 → 完成

この流れを、全文そのまま公開しています。

「きれいにまとめた解説」じゃなく、
コピーして真似できる「現物」です。

ちなみに——
こういうツール、外注したら
数千円〜数万円かかります。

このBrainは5,000円。

つまり本編の実例を1個 真似した時点で、
もう元が取れます。

中身には、40件ぶんの型が入っています。

━━━━━━━━━━━━

■ 7日後のあなた

→ 毎日1本、声だけで発信が出せている
→ 提案書のたたき台を、口述で作れている
→ AIへの指示が一発で通る
→ 「打つの面倒くさい」が消えている

━━━━━━━━━━━━

■ 始め方は2タイプ。読まなくてもいい

《Aタイプ：自分で読んで進める》
章の順番どおりでOK。迷いません。

《Bタイプ：このBrainを丸ごとコピーして、AIに渡す》

実はこれが一番ラクです。

本文をそのままAIに貼ると、
AIがあなた専属の先生になって、
手取り足取り進めてくれます。

つまりこの教材は、
「読めなかった」で終わることがない教材です。

マニュアルがしんどいあなたのために、
そこまで設計しました。

━━━━━━━━━━━━

■ 中身（全10章）

1. なぜ「声」なのか
2. 準備は5分で終わる
3. やさしいスタート
4. 声で発信する
5. 声で資料・提案を作る
6. 声で頼みごとをする
7. 声で記録する
8. 考えながら話す技術
9. 声1つをAIで何倍にもする
10. AIを「装備」する

重い章と軽い章を交互に置いています。
息切れしない順番です。

そして、途中でやめても大丈夫なように、
3章まで進んだ時点で
「打つ面倒」が消えるように作りました。

━━━━━━━━━━━━

■ 7日間ロードマップ付き

「で、今日何やればいいの？」に
迷わないように、
1日ずつやることを決めてあります。

1日目は、5分で終わります。

三日坊主のあなたのための設計です。

━━━━━━━━━━━━

■ 1ヶ月後のあなた

朝。
車を降りた時には、今日の発信が終わっている。

昼。
畑での独り言が、夜には提案書になっている。

夜。
子どもを寝かしつけたあと、
机に向かわなくていい。

そのまま寝てもいいし、好きなことをしてもいい。

「選べる」——これが自由です。

ここで、ひとつだけ
価値観の話をさせてください。

僕らはずっと
「仕事＝机に向かうこと」
だと思い込まされてきました。

だから時間がない人は
「机に向かえない自分」を責めてきた。

違います。

声が出せる場所は、ぜんぶ仕事場です。

車の中も、畑も、風呂上がりの廊下も。

この思い込みをひとつ外すだけで、
あなたの1日から
「時間がない」という言葉が消えます。

このBrainが本当に売っているのは、その書き換えです。

━━━━━━━━━━━━

■ 不安、先に潰しておきます

Q. 滑舌が悪い。方言もきつい
→ 大丈夫。AIは文脈で読み取ります。僕も畑で普通にしゃべってるだけです。うまく通らない時の直し方も本編に。

Q. 独り言、恥ずかしい
→ 最初は車の中だけでOK。誰も聞いてません。1週間で慣れます。

Q. お金がかかるんじゃ？
→ 始めるのに必要な道具は、いまあなたの手の中のスマホです。

Q. 機械オンチでも？
→ そのためのBタイプ（丸ごとコピーしてAIに渡す）です。読めなくても、AIが先生をやってくれます。

Q. どうせ続かない気がする
→ 1日目は5分です。しかも「頑張って続ける」ものじゃなく、「打つより楽だから勝手に続く」ものです。楽な方に流れるだけでいい。

━━━━━━━━━━━━

■ 5,000円は、正直、安すぎます

整理します。

→ 声だけで40件超を実装した「型」
→ 声→指示→修正→完成の全文ログ（コピーして使える現物）
→ AIを装備する土台
→ 特典3つ

本編の実例1個を外注に出したら
数千円〜数万円。
1個目で回収が終わる値段です。

1年で割れば、1日14円。

そして時間の側から見てください。

打つのをやめて浮く時間は、
1日30分なら年180時間。

5,000円で180時間買えるものを、
僕はほかに知りません。

しかもこれは1年で消えません。
声でAIを動かす型は、
一度通れば一生使えます。

━━━━━━━━━━━━

■ 最後に

このページを閉じたら、
あなたは「あとでやろう」に戻ります。

でも「あとで」は、来ません。
僕が何年もそうだったから分かります。

そして明日もあなたは車に乗り、
その時間は、また捨てられます。

買った瞬間、ロードマップの1日目が始まります。
1日目は5分。
今夜、寝かしつけのあとでも終わります。

早ければ明日の運転から、
あなたの移動時間は
「仕事が終わる時間」に変わります。

時間がない僕が、
時間がないあなたのために、
声だけで作った教材です。

次は、あなたの番です。`;
const ta=document.getElementById('txt'); ta.value=T;
function toast(msg){const t=document.getElementById('toast');if(msg)t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2100);}
document.getElementById('copy').onclick=async()=>{
  let ok=false;
  // 1) textareaを選択(スマホ最重要・execCommandの前提)
  ta.readOnly=false; ta.focus(); ta.select(); try{ta.setSelectionRange(0,999999);}catch(e){}
  // 2) clipboard API（HTTPS+ジェスチャで最優先）
  try{ await navigator.clipboard.writeText(T); ok=true; }catch(e){}
  // 3) execCommand（webview用フォールバック）
  if(!ok){ try{ ok=document.execCommand('copy'); }catch(e){} }
  ta.readOnly=true;
  if(ok){ toast('コピーした！ChatGPTに長押しで貼り付け'); }
  else { toast('上の文を長押し→全選択→コピーしてね'); }
};
</script>
</body>
</html>
