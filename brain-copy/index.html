<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Brain全文コピー｜品質チェッカーへ</title>
<style>
  :root{--bg:#0f1216;--card:#1a1f27;--line:#2a313c;--txt:#e9edf3;--sub:#93a0b4;--ac:#22c55e}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--txt);font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",system-ui,sans-serif;padding:16px;padding-bottom:100px;line-height:1.7}
  .head{text-align:center;margin:8px 0 16px}
  .head h1{font-size:17px;font-weight:800}
  .head p{font-size:12.5px;color:var(--sub);margin-top:6px;line-height:1.6}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;font-size:13px;white-space:pre-wrap;word-break:break-word;height:60vh;overflow:auto;-webkit-user-select:text;user-select:text;width:100%;color:var(--txt);font-family:inherit;line-height:1.7;resize:none;display:block}
  .hint{font-size:12px;color:var(--sub);text-align:center;margin-top:10px;line-height:1.6}
  .bar{position:fixed;left:0;right:0;bottom:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(transparent,#0f1216 22%);display:flex;gap:10px}
  .btn{flex:1;border:none;border-radius:13px;padding:16px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;background:linear-gradient(135deg,var(--ac),#16a34a);color:#fff;box-shadow:0 6px 20px rgba(34,197,94,.35)}
  .btn:active{transform:translateY(1px)}
  .btn.sub{background:var(--card);color:var(--txt);border:1px solid var(--line);flex:0 0 auto;box-shadow:none;padding:16px 18px}
  .toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);background:#000d;border:1px solid var(--line);color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;font-weight:800;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="head">
  <h1>📋 Brain全文コピー</h1>
  <p>下の「全文コピー」を1タップ →<br>ChatGPTの「ブレイン品質チェッカー」に貼り付け（長押し→ペースト）</p>
</div>
<textarea class="card" id="txt" readonly></textarea>
<div class="hint">効かない時は、上の文を長押し →「すべて選択」→「コピー」でもOK</div>
<div class="bar">
  <button class="btn sub" onclick="location.href='https://chatgpt.com'">GPTを開く</button>
  <button class="btn" id="copy">📋 全文コピー</button>
</div>
<div class="toast" id="toast">コピーした！ChatGPTに長押しで貼り付け</div>
<script>
const T = `もう打たない。声だけで、仕事が"終わる"。
── タイピングを捨てた個人事業主の「音声入力×AI」実務術（Brain最終版v4／5,000円）

対象：「言いたいこと・やることは頭にあるのに、"打つ"のが面倒で発信も資料も止まってしまう、個人事業主・農家・副業のあなた」。

■ こんな"3つの面倒"、ありませんか
・①打つのが面倒（発信も資料も後回し）
・②AIに何て指示すればいいか分からない
・③操作マニュアルを読んで、ルール通りに作業するのがしんどい
この教材は、その3つ全部を"声だけ"で越えます。

■ 一番やさしいスタート（初心者はここから）
・むずかしい設定も、完璧な指示もいらない。まず「資料をAIにぶち込んで、"これ、どうすればいい？"と声で聞くだけ」。
・慣れてきたら次は「入れた資料を要約して」と言うだけ。
・＝マニュアル不要。"喋って聞く"から始めて、少しずつ実務が回り出す。

■7日後、あなたはこうなっている
・毎日1本、発信を"声だけ"で出せている
・提案・見積りの説明文を、口述で作れている
・AI/人への指示が、迷わせず一発で通っている
・「打つのが面倒で止まる」感覚が、消えている
この4つに、7日で到達します。到達できないことは約束しません。

■この教材も、"声だけ"で作りました（運転しながら）
僕は農家。トラックの運転が日常で、運転中はパソコンもスマホも読めません。
かといって、帰ってからパソコンの前に座る時間もない。子どもとの時間、夕食の準備、お風呂、寝かしつけ…気づけば夜9時。
"まとまった作業時間"なんて、どこにもない。
だから、"声だけで仕事が完成する"仕組み＝音声×AIのバイブコーディングを作りました。
この教材そのものが、その証拠です。画面を見られない時間・机に向かえない毎日でも、実務が進む。

■はじめに ── あなたは今日、"打つ"のをやめる
やることは分かっている。書きたいことも頭にある。なのに「文字を打つ」一手間が面倒で、発信も資料も後回しにしていませんか。今、僕のアウトプットのほぼ全部は「声」から生まれています。B地点＝「頭に浮かんだことを声に出すだけで、発信・資料・指示・記録が完成物で出てくる状態を、自分の手で再現できる」。
本編では 声(全文)→文字起こし→AIへの指示(全文)→AI出力(全文)→自分が直した所→完成物 まで"全文"で公開します。（この販売ページでは、実ログ②を"実物"で、①③は要約で先出し＝購入後の本編で全文を掲載）。

■【一次情報】声だけで作った実ログ（②は実物・①③は要約→本編で全文公開）
実ログ②：声だけで動くツールを作った（一番疑われる所を全部見せる）
・声(全文)「このスクショに、赤枠がついたり、モザイクができたり、矢印が引っ張る機能を実装して」
・AI入力(全文)「画像に 赤枠/矢印/モザイク/ペン/文字 を付けられるWeb注釈ツール。スマホ対応、貼付/選択/ドラッグ、モザイクはなぞった範囲を自動ぼかし、保存とコピー両方、UIは商品品質ダーク」
・AI出力＝Canvasで矩形/矢印/モザイクを描く1ファイルHTML
・完成物＝実際に動くWebツール（ライブURLあり）
実ログ①：声「探偵もの縦2本」→AI→脚本→絵→音声→字幕→mp4自動→縦動画2本（約30分）
実ログ③：声「音声入力の実務Brain 5000円で構成」→この全文。この商品自体が声だけで生まれた。

■第1章 なぜ今 音声入力×実務か（ペイ感＝未来を買う）
【実測】発話は約150語/分、タイピングは約40語/分＝声はおよそ3.7倍速い（一般値）。さらに実証＝この教材の作者は今日1日で、声だけで 動画2本・漫画・注釈ツール・フォーム修正・市場リサーチ を"並行"で完成させた。
買うのは時短でなく未来：お金＝発信が止まらず機会損失を止める／精神＝打つ面倒のストレスが消える／能力＝考えながら喋る＝思考整理が作業しながら終わる／AI相性＝声素材は出力の質が上がる。
【正直に】音声入力が"向かない"場面もある＝表計算・数式、声を出せない場所、細かいコード修正は手入力が速い。だから「打つのを全部やめろ」ではなく「止まりがちな発信・資料・指示・記録を声で流す」が正解。

■第2章 環境ゼロ設定 ── 5分で投稿完成まで
スマホ1台・無料だけ。5分で 声でメモ→ChatGPTへ→整った投稿完成→1本投稿。開始5分で「もう元取れた」。

■第3章 実務が回る基本＋失敗パターン
区切って1文／記号は言葉で／固有名詞は後で置換／誤変換は最後にAIで一括。失敗：一気に喋る→崩壊→一息1文／騒音下→静かに／完璧に喋ろうと止まる→まず雑に全部→AIで整える。3章離脱でも価値。

■第4章 発信を声で（プロンプト公開）
プロンプト「私が喋ったメモの誤字を直し1つのX投稿(140字)に。結論先頭、理由は箇条書き、最後に一言、煽らず自然に→(声)」
【実例】声「白沢ハウス2、そろそろ花芽つきそう。今日の見回りメモをX1本に」→完成「今朝の見回りで、白沢2に花芽の兆し。焦って早めるより"待つ"のも農家の判断…」＝そのまま投稿可。失敗：全部盛る→1投稿1メッセージに。

■第5章 資料・提案を声で
プロンプト「口述を 現状→課題→提案→効果→費用 の提案書1枚に→(声)」
【実例】声「キャベツ全量買取の提案。現状と、先方の得を1枚に」→現状→課題→提案→効果→費用の提案書1枚が完成。失敗：説明だけ→相手の得を1文入れて喋る。

■第6章 指示・段取りを声で
プロンプト「私の声をAI/人が迷わない指示に。誰が何をいつまでに完了条件の4点で→(声)」
【実例】声「スクショに赤枠とモザイクと矢印を付ける機能を作って」→「誰=AI／何=Web注釈ツール／完了条件=赤枠・モザイク・矢印・保存が動く」に整形→実際に動くツールが完成（＝実ログ②）。失敗：曖昧→完了条件を必ず声に。

■第7章 記録・議事録を声で
声→要約→保存。記録が資産に。失敗：全部残す→決まった事/次やる事だけ。

■第8章 声で考えながら実務（実ログ）
本当の価値＝思考の外部化。生声「この商品どう売るか…5000円は高いかな、いや実ログがあれば安く…」→この迷いの声がそのまま構成に。

■第9章 声→AIで寝てても実務が進む（最大の武器）
声素材1つ→AIが 投稿1本＋要約＋タイトル3案＋関連ネタ5つ を一度に。
無料AIの役割分担：文章整形＝ChatGPT/Claude／音声化＝VOICEVOX／画像＝無料生成／組み立て＝無料ツール。
★ツールは役割で覚える（教材の寿命を延ばす）：名前は変わる。①整えるAI②声にするTTS③絵にする画像AI④組み立てる無料ツール、の4役割さえ押さえれば一生使える。
実証＝作者は今日1日 声だけで 動画・漫画・ツール・フォーム・リサーチ を並行で出した。

■第10章 時間を取り戻す（体験談で価値観書き換え）
昔は企画が頭にあるのに打つ面倒で消えていった。今は散歩しながら喋るだけで家に着く頃には出来ている。打つのをやめた日から頭の中のものが死ななくなった。声＝暗黙知が資産に。

■この教材が渡す"基礎"＝AIを装備する
これで、あなたは「AIを装備する」基礎が手に入ります。ここから先は、自由です。
・自分でバイブコーディングして、全部 自分で開発してもいい
・Brainで学びを買い足して、最強のAIツールを装備し、声だけで全部 操作してもいい
僕が今、実際にバイブコーディングで実装し運用している実務は、全部この延長線上にあります。
運転中の声だけから始まったこの土台に、あなたも今日から立てます。

■7日間ロードマップ（このとおりやれば、7日後ゴールに着く）
1日目：音声入力の設定（スマホ5分）＋"声でメモ→AIで整える"を1回体験
2日目：声でX投稿を1本（第4章の発信プロンプト）
3日目：声で提案・説明文を1枚（第5章）
4日目：声でAI/人への指示を1本（第6章＝迷わせない4点）
5日目：声で記録・議事録を1本（第7章＝決めた事/次やる事）
6日目：声1つ→AIで複数展開（第9章＝投稿＋要約＋タイトル案＋関連ネタを一度に）
7日目：声→AIで"動画 or 教材"を1本（寝てても実務／実ログ①の型）
→ この7日で「毎日1本 声だけで出せる／提案も指示も口述で通る」状態になります。

■特典/巻末QA/完走
特典A=声かけ&AIプロンプト集／B=実ログ完全版集（本編で音声全文・AI入力全文・AI出力・修正・完成物URL）／C=声→AI無料接続手順書。QA=誤変換/方言/騒音/長文崩れ/修正面倒。緩急=重(3,4,8,9)×軽(1,2,7,10)交互＋各章小達成＋7日後ゴール＋7日間ロードマップで完走。`;
const ta=document.getElementById('txt'); ta.value=T;
function toast(msg){const t=document.getElementById('toast');if(msg)t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2100);}
document.getElementById('copy').onclick=async()=>{
  let ok=false;
  // 1) textareaを選択(スマホ最重要・execCommandの前提)
  ta.readOnly=false; ta.focus(); ta.select(); try{ta.setSelectionRange(0,999999);}catch(e){}
  // 2) clipboard API（HTTPS+ジェスチャで最優先）
  try{ await navigator.clipboard.writeText(T); ok=true; }catch(e){}
  // 3) execCommand（webview用フォールバック）
  if(!ok){ try{ ok=document.execCommand('copy'); }catch(e){} }
  ta.readOnly=true;
  if(ok){ toast('コピーした！ChatGPTに長押しで貼り付け'); }
  else { toast('上の文を長押し→全選択→コピーしてね'); }
};
</script>
</body>
</html>
