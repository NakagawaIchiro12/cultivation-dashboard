━━━━━━━━━━━━

話す速さは、打つ速さの およそ3.7倍（発話150語/分・打鍵40語/分）。

スマホ1台・無料だけ。

声でメモ → AIへ → 整った投稿が完成 → 1本投稿。

━━━━━━━━━━━━

キーボードも、コードの知識も、PCの前に座る時間もいりません。

→ あなたは"作りたい"を声で言うだけ。作るのはAIです。

━━━━━━━━━━━━

■ 導入ステップ：始め方は2タイプ

《タイプA：自分で入れる》

・① スマホに、声で指示できるAIを入れる

・② 「音声入力」をオンにする

・③ 作りたいことを、声で言う

・④ 出てきたものを使う → 直しも声で

・⑤ 慣れたら、各章の"声のかけ方"を1つずつ

・① このBrainを"全文コピー"する

・② AIに貼り付けて「この通りに、私の環境で使えるようにして」と頼む

・③ AIが手順を組んで、案内してくれる

・④ あなたは、案内どおりに進めるだけ

→ 迷ったらB。"覚える"より"任せる"が、一番やさしい入口です。

━━━━━━━━━━━━

■ 第3章 声で実務が回る、基本と失敗

・区切って1文ずつ話す

・記号は言葉で言う

・誤変換は、最後にAIで一括で直す

失敗しがちなのは、一気に喋って崩壊すること。

完璧に喋ろうとして止まるより、まず雑に全部 → AIで整える、が正解です。

━━━━━━━━━━━━

AIへの頼み方（例）：
「私が喋ったメモの誤字を直して、X投稿1本（140字）に。
　結論を先頭、理由は箇条書き、最後に一言。煽らず自然に → （声）」

実例：
声「白沢ハウス2、そろそろ花芽つきそう。今日の見回りメモをX1本に」

→ 完成「今朝の見回りで、白沢2に花芽の兆し。
　　　　焦って早めるより"待つ"のも農家の判断…」

そのまま投稿できます。

━━━━━━━━━━━━

■ 第5章 資料・提案を、声で

AIへの頼み方（例）：
「この口述を、現状→課題→提案→効果→費用 の提案書1枚に → （声）」

実例：
声「キャベツ全量買取の提案。現状と、先方の得を1枚に」

→ 提案書1枚が完成。

コツは、相手の"得"を1文入れて喋ることです。

━━━━━━━━━━━━

■ 第6章 指示・段取りを、声で

AIへの頼み方（例）：
「私の声を、AIや人が迷わない指示に。
　誰が・何を・いつまでに・完了条件、の4点で → （声）」

実例：
声「スクショに赤枠・モザイク・矢印を付ける機能を作って」

→「誰=AI／何=Web注釈ツール／完了条件=赤枠・モザイク・矢印・保存が動く」に整形

→ 実際に動くツールが完成（＝さっきの記録②）。

━━━━━━━━━━━━

■ 第7章 記録・議事録を、声で

声 → 要約 → 保存。記録が"資産"になります。

全部残さず、「決まった事」と「次やる事」だけに絞るのがコツです。

━━━━━━━━━━━━

■ 第8章 声で"考えながら"実務する

本当のすごさは、頭の中を そのまま外に出せることです。

生の声「この商品どう売るか…5,000円は高いかな、いや実ログがあれば…」

→ この"迷いの声"が、そのまま構成になりました。

━━━━━━━━━━━━

無料AIの役割分担：

・文章を整える ＝ ChatGPT や Claude

・声にする ＝ VOICEVOX（無料）

・絵にする ＝ 無料の画像AI

・組み立てる ＝ 無料ツール

→ ツールは"役割"で覚える。名前は変わっても、この4役割は一生使えます。

━━━━━━━━━━━━

今は、散歩しながら喋るだけで、家に着く頃には出来ている。

打つのをやめた日から、頭の中のものが、死ななくなりました。

声にした"頭の中の経験"が、財産に変わります。

━━━━━━━━━━━━

これで、あなたは「AIを装備する」基礎が手に入ります。

ここから先は、自由です。

・自分でバイブコーディングして、全部 自分で開発してもいい

・Brainで学びを買い足して、最強のAIを装備し、声だけで操作してもいい

僕が今 使っている仕事のやり方は、全部この延長線上にあります。

運転中の声だけから始まったこの土台に、あなたも今日から立てます。

━━━━━━━━━━━━

→ この7日で「毎日1本、声だけで出せる」状態になります。

━━━━━━━━━━━━

■ 特典

・特典A ＝ 声かけ & AIプロンプト集

・特典B ＝ 実ログ完全版（音声全文・AI入力全文・出力・修正・完成物URL）

・特典C ＝ 声 → AI 無料接続の手順書

最後まで、声だけで走り切れる設計です。`;
const ta=document.getElementById('txt'); ta.value=T;
function toast(msg){const t=document.getElementById('toast');if(msg)t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2100);}
document.getElementById('copy').onclick=async()=>{
  let ok=false;
  // 1) textareaを選択(スマホ最重要・execCommandの前提)
  ta.readOnly=false; ta.focus(); ta.select(); try{ta.setSelectionRange(0,999999);}catch(e){}
  // 2) clipboard API（HTTPS+ジェスチャで最優先）
  try{ await navigator.clipboard.writeText(T); ok=true; }catch(e){}
  // 3) execCommand（webview用フォールバック）
  if(!ok){ try{ ok=document.execCommand('copy'); }catch(e){} }
  ta.readOnly=true;
  if(ok){ toast('コピーした！ChatGPTに長押しで貼り付け'); }
  else { toast('上の文を長押し→全選択→コピーしてね'); }
};
