<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>農業相談会スライド（三上結城さん）</title>
<style>
  :root{ --green:#2e7d32; --green-d:#1b5e20; --ink:#1c2b1e; --paper:#f6f8f3; --gold:#b8892b; --line:#dfe6d8; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:#0e1410;color:var(--ink);overflow:hidden;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .slide{display:none;width:100%;height:100%;padding:6vh 8vw;flex-direction:column;justify-content:center;
         position:relative;background-color:var(--paper);
         background-image:linear-gradient(100deg,
             rgba(246,248,243,.98) 0%, rgba(246,248,243,.96) 48%,
             rgba(246,248,243,.82) 74%, rgba(246,248,243,.5) 100%),
           url('bg-content.jpg');
         background-size:cover;background-position:center right;}
  .slide.active{display:flex;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .kicker{color:var(--green-d);font-weight:800;font-size:3vh;letter-spacing:.12em;margin-bottom:2.6vh;}
  h1{font-size:8.4vh;line-height:1.22;color:var(--green-d);font-weight:900;letter-spacing:.01em;}
  h2{font-size:6.6vh;line-height:1.28;color:var(--green-d);font-weight:900;}
  .sub{font-size:4.6vh;line-height:1.55;margin-top:3.4vh;color:#1c2b1e;font-weight:600;max-width:40ch;}
  ul.pts{margin-top:3.6vh;list-style:none;display:flex;flex-direction:column;gap:2.6vh;}
  ul.pts li{font-size:4.8vh;line-height:1.4;font-weight:700;padding-left:1.4em;position:relative;color:#1c2b1e;}
  ul.pts li::before{content:"";position:absolute;left:0;top:.5em;width:.55em;height:.55em;border-radius:50%;background:var(--gold);}
  .quote{font-size:4.4vh;line-height:1.6;color:#1c2b1e;font-weight:600;max-width:38ch;margin-top:2.6vh;
         border-left:.8vh solid var(--green);padding:1vh 0 1vh 3vw;background:#fff;border-radius:0 12px 12px 0;
         box-shadow:0 6px 24px rgba(30,60,25,.08);padding-right:3vw;padding-top:2.6vh;padding-bottom:2.6vh;}
  .who{margin-top:2.4vh;font-size:3.4vh;color:var(--gold);font-weight:800;}
  .big{font-size:10vh;color:var(--green-d);font-weight:900;}
  .price{font-size:13vh;color:var(--green-d);font-weight:900;letter-spacing:.02em;}
  /* 核心の悩み 見える化 */
  .worrycore{margin-top:2.2vh;font-size:6.4vh;line-height:1.25;color:var(--green-d);font-weight:900;
             background:#fff;border-left:1vh solid var(--gold);border-radius:0 14px 14px 0;
             padding:2.4vh 3vw;box-shadow:0 8px 28px rgba(30,60,25,.10);max-width:34ch;}
  .worrycards{display:flex;gap:2vw;margin-top:3.4vh;flex-wrap:wrap;max-width:58ch;}
  .wcard{flex:1 1 0;min-width:22vh;background:#fff;border:.3vh solid var(--line);border-radius:16px;
         padding:2.2vh 1.6vw;box-shadow:0 6px 20px rgba(30,60,25,.07);}
  .wcard.on{background:#eef6ea;border-color:var(--green);}
  .wc-h{font-size:3vh;font-weight:800;color:var(--gold);letter-spacing:.04em;margin-bottom:1.2vh;}
  .wcard.on .wc-h{color:var(--green-d);}
  .wc-b{font-size:3.6vh;line-height:1.4;font-weight:700;color:#1c2b1e;}
  .wc-b b{color:var(--green-d);}
  .cover{background-image:linear-gradient(100deg,
             rgba(247,250,244,.93) 0%, rgba(247,250,244,.88) 40%,
             rgba(247,250,244,.55) 72%, rgba(247,250,244,.30) 100%),
           url('bg-cover.jpg');
         background-size:cover;background-position:center right;color:var(--ink);
         border-top:1.2vh solid var(--green-d);}
  .cover h1{color:var(--green-d);font-size:9vh;text-shadow:none;}
  .cover .sub{color:#33422f;}
  .cover .kicker{color:var(--green);}
  .cover .tag{background:var(--green-d);color:#fff;box-shadow:0 6px 20px rgba(27,60,25,.22);}
  .tag{display:inline-block;background:#fff;color:var(--green-d);font-weight:800;border-radius:999px;
       padding:1.3vh 3vw;font-size:3.6vh;margin-top:4vh;}
  .foot{display:none;}
  #counter{position:fixed;right:2.4vw;bottom:2.4vh;font-size:3vh;font-weight:700;color:#2e7d32;background:rgba(255,255,255,.85);
           padding:.8vh 1.8vw;border-radius:999px;z-index:20;}
  /* presenter notes: hidden by default, toggle with N. Warn: do not toggle while screen-sharing. */
  #note{position:fixed;left:0;right:0;bottom:0;background:#12241a;color:#eafff0;padding:2.4vh 8vw;
        font-size:3vh;line-height:1.6;display:none;z-index:30;border-top:.5vh solid var(--gold);max-height:44vh;overflow:auto;}
  #note.show{display:block;}
  #note b{color:var(--gold);}
  #hint{display:none;}
  .warn{position:absolute;top:3vh;right:8vw;font-size:2.8vh;color:#b8892b;font-weight:800;}
</style>
</head>
<body>
<div id="stage"></div>
<div id="counter"></div>
<div id="hint">← → めくる｜ N=トーク台本の表示切替（画面共有中は押さない）</div>
<div id="note"></div>
<script>
/* client-safe見出し＋短い要点＝projected。note=口頭トーク（発表者のみ・画面共有では出さない）
   三上結城さん版（2026-07-08）＝岸v3ベース。ご主人様口述の読みを反映＝勇気が出ない核は"稼げてないから選べない"／一足飛び禁止(飛ばすと生活が的中)／資金は現実的(ゼロで飛べるとは言わない・貯める期間も選択肢)／いきなり専業でなく雇用・副業農業も選択肢／道の駅が切れた痛みを汲む。過度に煽らない・でも夢は否定しない(順番を踏めば可能は残す)。価格/希少性/クロージングは岸版どおり維持 */
const S = [
 {cls:"cover", kicker:"農業相談会", h:"今日は、あなたの夢の一歩を<br>少しでも軽くする時間です", sub:"「脱サラして農業を」——その気持ちを整理して、怖くない順番と、今日の一歩を1つ持ち帰る時間です。",
  tag:"農業相談会", note:"三上さん、本日はお時間ありがとうございます。今日は三上さんが「脱サラして農業をやりたい」その一歩を、少しでも軽くするための時間です。今の状況を整理して、次に何をすればいいかを一緒に明確にします。いきなり何かを売る場ではありません。まずは話を聞かせてください。"},

 {kicker:"はじめに", h:"今日のゴール", pts:["今の不安を「見える形」に整理する","脱サラの前に“確かめる”順番を知る","今日の一歩を1つ持ち帰る"],
  note:"ゴールは3つ。今の不安を見える形に整理／脱サラの前に確かめる順番を知る／今日の一歩を1つ持ち帰る。これだけでだいぶ気持ちが軽くなります。"},
 {kicker:"はじめに", h:"今日の進め方", sub:"まず、三上さんの話を聞かせてください。そのあと必要なら解決策を。合わなければ無理に案内しません。役に立てる時だけ提案します。",
  note:"まず三上さんの話を聞かせてください。そのあと必要なら考え方や解決策をお伝えします。合わないと感じたら無理に案内はしません。役に立てる時だけ提案します。"},

 {kicker:"確認させてください", h:"三上さんの夢を、確認させてください", sub:"「脱サラして農業していたい」「土いじってる時が1番…」——三上さんが書いてくれたこの言葉、すごく大事だと思いました。",
  note:"アンケート読みました。この言葉すごく大事だと思いました。まず教えてください。農業で暮らしていきたいと思ったきっかけって何だったんですか。"},
 {kicker:"確認させてください", h:"勇気が出ないのは、性格じゃない", sub:"「脱サラする勇気が出ない」——それは弱さじゃなく、まだ農業で“稼げてない”から「選べない」だけ。稼げていれば、副業のまま続けるのも専業に移るのも、自分で選べます。",
  note:"頭を抱えていること＝勇気が出ない、子供2人・生活。正直に書いてくれてありがとう。ひとつ見立てを言うと、勇気が出ないのは性格が弱いからじゃなく、まだ農業で稼げてなくて「選べない」だけ。稼げていれば副業のまま続けるのも専業に移るのも自分で選べる。今はそこに届いてないから辞めるのも続けるのも怖い。だから今日ほどくのは“勇気”でなく、この「選べる状態」に近づく順番。いちばん怖いのはどこですか。収入が途切れること？家族の反対？失敗？"},
 {kicker:"三上さんの、本当の悩み", h:"“勇気が出ない”の正体を、分解します",
  diagram:`<div class="worrycore">「脱サラする勇気が、出ない」</div>
  <div class="worrycards">
    <div class="wcard"><div class="wc-h">💰 お金</div><div class="wc-b">使える資金は<br><b>「無いに等しい」</b></div></div>
    <div class="wcard"><div class="wc-h">👨‍👩‍👧 家族</div><div class="wc-b">中2・小6の<br><b>子ども2人の生活</b></div></div>
    <div class="wcard on"><div class="wc-h">🌱 でも</div><div class="wc-b">「土いじってる時が1番…」<br><b>＝夢は、本物</b></div></div>
  </div>`,
  note:"三上さんの“勇気が出ない”を分解すると、正体は2つの不安＝①お金（資金は無いに等しい）②家族（中2・小6の子ども2人の生活）。ここが肝心＝この2つが重く感じるのは、まだ農業で稼げてなくて「選べない」から。収入のあてがあれば今ほど怖くない＝“稼げる形”が見えるほどこの不安は勝手に軽くなる。そして右の1枚が一番大事＝逐語「土いじってる時が1番…」＝農業が心から好き＝夢は本物。だから今日やるのは夢を諦めさせることでなく、“選べる状態”に近づく順番を作ってこの2つを小さくすること。「怖いのは当然、でも消し方がある」と伝える。※逐語は“1番最後なんです”表記（入力の揺れ）＝彼の言葉として意味だけ拾い、勝手に“幸せ”等へ改変しない。"},
 {kicker:"ここ、大事です", h:"三上さんは、ゼロじゃない", pts:["畑は20アール、借りられる","作りたい作物（キャベツ・青ネギ）は決まってる","1年前、道の駅に出荷していた＝“売った経験”がある"],
  note:"ここ大事なので言わせてください。三上さんはゼロから始める人じゃない。畑は借りられる、作物も決まってる、そして道の駅に出した経験がある。転勤で中断しただけ。自分では当たり前に思ってません？"},
 {kicker:"確認させてください", h:"道の駅の頃の手応えは？", sub:"青ネギや玉ねぎを出していた頃、売れ行き・値段・続けられそうな感覚は。——それが転勤で出せなくなった。回りかけてた売り先が切れたのは、悔しかったんじゃないですか。今の邑南町にも、近くの道の駅や直売所はありますか。",
  note:"道の駅に出していた頃の手応えは？売れ行き・値段・続けられそうだった感覚。それが転勤で出せなくなった＝せっかく回りかけてた売り先が切れた、そこ悔しかったんじゃないですか（痛みを汲む）。今の場所でも近くに道の駅や直売所はありますか。そこがまた“売り先”に戻せるかが地味に大きい。"},
 {kicker:"お金のことを、正直に", h:"お金がないからこそ、順番が命", sub:"資金が「無いに等しい」まま一気に始めるのは、正直かなり大変。だからこそ①お金をかけない始め方②必要なら“まず少し資金を貯める”のも立派な順番。無理にゼロのまま飛ばなくていい。",
  note:"資金は無いに等しい、と正直に書いてくれて助かる。今日はお金の話も逃げずに。正直、資金ゼロのまま一気に始めるのはけっこう大変＝ここは煽らず本当のことを言う。だから2つ＝①お金をかけない始め方を選ぶ②場合によっては“まず少し資金を貯めるところから”も立派な順番。無理にゼロのまま飛ばなくていい。今ざっくりで、初期にどのくらいなら無理なく動かせそうですか。"},
 {kicker:"確認させてください", h:"「迷ったまま」だと、どうなる？", sub:"やりたい気持ちはあるのに踏み出せない、が1年続いたら。焦らせたいわけじゃない。ただ“迷い続けること”にもコストがあります。",
  note:"今のまま迷いが1年続いたらどんな気持ちでいると思いますか。畑を借りられるチャンスも道の駅の記憶も少しずつ遠くなる。焦らせたいわけじゃなく、迷い続けること自体にコストがあるという話です。"},
 {kicker:"確認させてください", h:"本当は、どんな1日を描いてますか", sub:"脱サラして専業が理想ですよね。子供と過ごす時間、畑に出る時間、収入。正解を決める場でなく、“選べる状態”を作るのが今日の狙いです。",
  note:"脱サラして専業が理想ですよね。その先にどんな1日を描いてますか。正解を決める場じゃなく、選べる状態を作るのが今日の狙いです。"},

 {kicker:"ポイント", h:"その不安を消す“順番”、興味ありますか？", sub:"必要なのは、いきなり全部を賭けることじゃなく、“怖くない順番”で確かめながら進むこと。",
  note:"【テストクロージング①・軽く】必要なのは全部を賭けることでなく、怖くない順番で確かめながら進むこと。その順番の話、聞いてみたいですか？「はい」を得てから。押さない。"},

 {kicker:"考え方", h:"踏み出せないのは、勇気不足じゃない", sub:"“何をどの順番でやれば安全に確かめられるか”が見えてないから、全部を賭けるように感じて怖いだけ。順番が見えれば、怖さはかなり減ります。",
  note:"踏み出せないのは勇気が足りないからじゃない。順番が見えてないから全部を賭けるように感じて怖いだけ。順番が見えれば怖さはかなり減ります。"},
 {kicker:"考え方", h:"脱サラは「一気に飛ぶ」ものじゃない", sub:"今の仕事を続けたまま、小さく作って・小さく売って、“これなら食べていける”を確かめてから飛ぶ。順番を踏めば脱サラはできる。でも飛ばすと、一番怖い“生活のこと”が的中します。",
  note:"ここ一番伝えたい。脱サラ＝いきなり全部を賭けるじゃなくていい。今の仕事を続けたまま小さく作って小さく売って、食べていけると確かめてから飛ぶ＝順番を踏めば脱サラは十分できる。ただしここを飛ばすと、三上さんが一番怖がってる“生活のこと”が本当に的中する（稼げる形を確かめる前に辞める→収入途切れ→子供2人の生活が苦しくなる）。だから一足飛びだけは絶対しない。“踏めば届く／飛ばすと危険”の両方が本当。"},
 {kicker:"考え方", h:"順番は「安定 → 売り先 → 拡大」", sub:"三上さんはもう作物も畑も、売り先の記憶もある。あとはこれを“順番に”つなぐだけ。飛ばして“いきなり専業”に賭けると、生活が的中します。",
  note:"順番を間違えると苦しくなる。まず安定、次に売り先、最後に拡大。三上さんはもう材料がある。あとは順番につなぐだけ。逆にこの順番を飛ばして“いきなり専業”に賭けると生活が的中する。飛ばさないことが、いちばんの家族を守る保険です。"},
 {kicker:"もうひとつの道", h:"いきなり専業じゃなく<br>「関わりながら稼ぐ」道もある", pts:["① 今の仕事を続けながら、副業で小さく農業","② 近くの農業法人に雇ってもらい、給料をもらいながら学ぶ","③ 繁忙期だけ農業バイトに入って、体で覚える"],
  note:"【三上さん専用・収入設計】三上さんは「家族50%・農業50%」と書いた＝いきなり100%専業に飛ぶ必要はない。農業に関わりながら収入を切らさない道は何本もある＝①今の仕事を続けながら副業農業②近くの農業法人に雇われて給料をもらいながら現場を学ぶ③繁忙期だけ農業バイト。どれも“収入を途切れさせずに農業に近づく”やり方。専業は最後のゴールに置いて、まずはどれかで「農業で1円でも稼ぐ」を先に作る＝生活を守りながら夢に近づく現実的な入り口。※雇用/バイトは一般的な選択肢の提示（憶測の数字は言わない）。"},
 {kicker:"考え方", h:"お金がないからこそ、順番が命", sub:"少ない資金で大きな投資を先にしない。小さく始めて、売れると分かってから広げる。それでも足りないなら“まず少し資金を貯めてから”も、逃げじゃなく立派な順番です。",
  note:"資金が少ないと不利、は逆。お金がないからこそ大きな投資を先にしない。小さく始めて売れてから広げる＝失敗が小さく済む。それでも足りないなら“まず少し資金を貯めてから始める”のも逃げじゃなく立派な順番＝ゼロのまま無理に飛ぶより結局早いことも多い。補助金の当てにしすぎも危ない、僕自身が痛い目を見ました。"},

 {kicker:"僕の話", h:"僕も、1代目・ゼロから始めました", sub:"今のすごい農家はほとんど親から継いでいます。僕は継いでいません。だから、三上さんの“怖さ”はよく分かります。",
  note:"偉そうに言ってますが僕も1代目、ゼロから始めた農家。今のすごい農家はほとんど親から継いでる。僕は継いでない。だから三上さんの怖さ、よく分かります。"},
 {kicker:"僕の話", h:"正直に言うと、僕は順番を間違えました", sub:"売り先を先に作ろうとして、納品2週間前に量が半分。取引先に電話するのに手が震えた。補助金は生活費に消え、人参をほぼ腐らせた。——怖くて当然なんです。",
  note:"正直に言います。最初は順番を逆にした。売り先を先に作ろうとして納品2週間前に量が半分、取引先に電話するのに手が震えた。補助金も生活費に消え、人参をほぼ腐らせ病気の名前も知らなかった。怖くて当然。だから同じ間違いをしてほしくない。事実です（誇張なし）。"},
 {kicker:"実績", h:"1日実働 約5時間で、年間100t超", sub:"農業歴16年の1代目専業農家。朝9時〜14時。根性でなく、正しい順番で積み上げた“仕組み”の結果です。",
  note:"それでも続けて今は農業歴16年、年間100t超を1日実働約5時間で回してます。朝9〜14時。根性でなく仕組み。正しい順番で積み上げた結果です。"},
 {kicker:"実績", h:"大不作の年でも、3日で1ヶ月分を回収", sub:"2024年の大不作でも、3日間で1ヶ月分の売上を回収。運ではなく、作る前・売る前・届ける前の準備。",
  note:"2024年の大不作でも3日間で1ヶ月分の売上を回収。運でなく、作る前・売る前・届ける前の準備があったからです。"},
 {kicker:"実績", h:"有機JASニンジン産地化と表彰", sub:"愛知初の有機JASニンジン産地化／3年連続で別作物の表彰／発芽率70%→95%以上。順番と改善の積み重ねです。",
  note:"愛知初の有機JASニンジン産地化、3年連続表彰、発芽率70→95%以上。順番と改善の積み重ねです。"},

 /* ===== 信頼性強化：相談者の声（実素材のみ・匿名/実名の指定厳守。岸版の確定テキストを流用） ===== */
 {kicker:"相談者の声", h:"1年前、ゼロから始めた方", sub:"※表記は匿名です",

const stage=document.getElementById('stage');
S.forEach((s,i)=>{
  const d=document.createElement('div');
  d.className='slide'+(s.cls?(' '+s.cls):'');
  let inner='';
  if(s.kicker) inner+=`<div class="kicker">${s.kicker}</div>`;
  inner+=`<h1>${s.h}</h1>`;
  if(s.sub) inner+=`<div class="sub">${s.sub}</div>`;
  if(s.quote) inner+=`<div class="quote">「${s.quote}」</div>`+(s.subq?'':'');
  if(s.sub&&s.quote){}
  if(s.pts){inner+='<ul class="pts">'+s.pts.map(p=>`<li>${p}</li>`).join('')+'</ul>';}
  if(s.diagram) inner+=s.diagram;
  if(s.tag) inner+=`<div class="tag">${s.tag}</div>`;
  if(s.who) inner+=`<div class="who">${s.who}</div>`;
  inner+=`<div class="foot">稼げる農業の仕組み化 伴走プログラム</div>`;
  d.innerHTML=inner;
  d.dataset.note=s.note||'';
  stage.appendChild(d);
});
let cur=0;const slides=[...document.querySelectorAll('.slide')];
const counter=document.getElementById('counter');
const noteBox=document.getElementById('note');let noteOn=false;
function show(i){cur=Math.max(0,Math.min(slides.length-1,i));
  slides.forEach((s,k)=>s.classList.toggle('active',k===cur));
  counter.textContent=(cur+1)+' / '+slides.length;
  if(noteOn){noteBox.innerHTML='<b>🎙 トーク台本（発表者のみ）：</b> '+(slides[cur].dataset.note||'—');}
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){show(cur+1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){show(cur-1);}
  else if(e.key.toLowerCase()==='n'){noteOn=!noteOn;noteBox.classList.toggle('show',noteOn);show(cur);}
  else if(e.key==='Home'){show(0);}else if(e.key==='End'){show(slides.length-1);}
});
stage.addEventListener('click',()=>show(cur+1));
const _h=parseInt((location.hash||'').slice(1),10);
show(isNaN(_h)?0:_h);
</script>
