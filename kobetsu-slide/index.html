<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>個別面談スライド（イチロウ）</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;}
  .wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  /* どんな画面/ウィンドウでも“画面に収まる最大の16:9”で固定表示（全画面にしなくても崩れない） */
  .box{width:min(100vw,177.78vh);height:min(56.25vw,100vh);box-shadow:0 0 40px rgba(0,0,0,.6);}
  iframe{width:100%;height:100%;border:0;display:block;background:#fff;}
</style></head>
<body>
  <div class="wrap"><div class="box"><iframe src="deck.html" scrolling="no"></iframe></div></div>
</body></html>
