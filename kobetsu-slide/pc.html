<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>個別面談スライド（PCレイアウト・16:9固定プレビュー）</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;}
  .wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  /* 画面に収まる最大の16:9ボックス（スマホでもPCと同じ比率で表示） */
  .box{width:min(100vw,177.78vh);height:min(56.25vw,100vh);box-shadow:0 0 40px rgba(0,0,0,.6);}
  iframe{width:100%;height:100%;border:0;display:block;background:#fff;}
  .hint{position:fixed;left:0;right:0;bottom:6px;text-align:center;color:#888;font-size:12px;font-family:sans-serif;}
</style></head>
<body>
  <div class="wrap"><div class="box"><iframe src="index.html" scrolling="no"></iframe></div></div>
  <div class="hint">PCと同じ16:9表示｜画面の右半分タップ=次／左=前・スワイプでもめくれます</div>
</body></html>
