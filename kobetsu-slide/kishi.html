<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>個別面談スライド（岸さん専用）</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;}
  #box{position:absolute;top:50%;left:50%;width:1280px;height:720px;
       transform:translate(-50%,-50%) scale(1);transform-origin:center center;
       box-shadow:0 0 40px rgba(0,0,0,.6);}
  iframe{width:1280px;height:720px;border:0;display:block;background:#fff;}
</style></head>
<body>
  <div id="box"><iframe src="deck_kishi.html" scrolling="no"></iframe></div>
  <script>
    var box=document.getElementById('box');
    function fit(){var s=Math.min(window.innerWidth/1280,window.innerHeight/720);
      box.style.transform='translate(-50%,-50%) scale('+s+')';}
    window.addEventListener('resize',fit);window.addEventListener('orientationchange',fit);fit();
  </script>
</body></html>
