<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>農業相談会スライド</title>
<style>
  :root{ --green:#2e7d32; --green-d:#1b5e20; --ink:#1c2b1e; --paper:#f6f8f3; --gold:#b8892b; --line:#dfe6d8; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:#0e1410;color:var(--ink);overflow:hidden;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .slide{display:none;width:100%;height:100%;padding:6vh 8vw;flex-direction:column;justify-content:center;
         position:relative;background-color:var(--paper);
         background-image:linear-gradient(100deg,
             rgba(246,248,243,.98) 0%, rgba(246,248,243,.96) 48%,
             rgba(246,248,243,.82) 74%, rgba(246,248,243,.5) 100%),
           url('bg-content.jpg');
         background-size:cover;background-position:center right;}
  .slide.active{display:flex;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .kicker{color:var(--green-d);font-weight:800;font-size:3vh;letter-spacing:.12em;margin-bottom:2.6vh;}
  h1{font-size:8.4vh;line-height:1.22;color:var(--green-d);font-weight:900;letter-spacing:.01em;}
  h2{font-size:6.6vh;line-height:1.28;color:var(--green-d);font-weight:900;}
  .sub{font-size:4.6vh;line-height:1.55;margin-top:3.4vh;color:#1c2b1e;font-weight:600;max-width:40ch;}
  ul.pts{margin-top:3.6vh;list-style:none;display:flex;flex-direction:column;gap:2.6vh;}
  ul.pts li{font-size:4.8vh;line-height:1.4;font-weight:700;padding-left:1.4em;position:relative;color:#1c2b1e;}
  ul.pts li::before{content:"";position:absolute;left:0;top:.5em;width:.55em;height:.55em;border-radius:50%;background:var(--gold);}
  .quote{font-size:4.4vh;line-height:1.6;color:#1c2b1e;font-weight:600;max-width:38ch;margin-top:2.6vh;
         border-left:.8vh solid var(--green);padding:1vh 0 1vh 3vw;background:#fff;border-radius:0 12px 12px 0;
         box-shadow:0 6px 24px rgba(30,60,25,.08);padding-right:3vw;padding-top:2.6vh;padding-bottom:2.6vh;}
  .who{margin-top:2.4vh;font-size:3.4vh;color:var(--gold);font-weight:800;}
  .big{font-size:10vh;color:var(--green-d);font-weight:900;}
  .price{font-size:13vh;color:var(--green-d);font-weight:900;letter-spacing:.02em;}
  .cover{background-image:linear-gradient(100deg,
             rgba(247,250,244,.93) 0%, rgba(247,250,244,.88) 40%,
             rgba(247,250,244,.55) 72%, rgba(247,250,244,.30) 100%),
           url('bg-cover.jpg');
         background-size:cover;background-position:center right;color:var(--ink);
         border-top:1.2vh solid var(--green-d);}
  .cover h1{color:var(--green-d);font-size:9vh;text-shadow:none;}
  .cover .sub{color:#33422f;}
  .cover .kicker{color:var(--green);}
  .cover .tag{background:var(--green-d);color:#fff;box-shadow:0 6px 20px rgba(27,60,25,.22);}
  .tag{display:inline-block;background:#fff;color:var(--green-d);font-weight:800;border-radius:999px;
       padding:1.3vh 3vw;font-size:3.6vh;margin-top:4vh;}
  .foot{display:none;}
  #counter{position:fixed;right:2.4vw;bottom:2.4vh;font-size:3vh;font-weight:700;color:#2e7d32;background:rgba(255,255,255,.85);
           padding:.8vh 1.8vw;border-radius:999px;z-index:20;}
  /* presenter notes: hidden by default, toggle with N. Warn: do not toggle while screen-sharing. */
  #note{position:fixed;left:0;right:0;bottom:0;background:#12241a;color:#eafff0;padding:2.4vh 8vw;
        font-size:3vh;line-height:1.6;display:none;z-index:30;border-top:.5vh solid var(--gold);max-height:44vh;overflow:auto;}
  #note.show{display:block;}
  #note b{color:var(--gold);}
  #hint{display:none;}
  .warn{position:absolute;top:3vh;right:8vw;font-size:2.8vh;color:#b8892b;font-weight:800;}
</style>
</head>
<body>
<div id="stage"></div>
<div id="counter"></div>
<div id="hint">← → めくる｜ N=トーク台本の表示切替（画面共有中は押さない）</div>
<div id="note"></div>
<script>
/* client-safe見出し＋短い要点＝projected。note=口頭トーク（発表者のみ・画面共有では出さない） */
const S = [
 {cls:"cover", kicker:"農業相談会", h:"今日は、あなたの農業が<br>今より一歩、進むための時間です", sub:"今の状況を整理して、明日からの一手を1つ持ち帰る時間です。",
  tag:"農業相談会", note:"本日はお時間ありがとうございます。今日は、あなたの農業が今より一歩、前に進むための時間です。今の状況を整理して、明日から何をすればいいかを、1つ持ち帰ってもらいます。"},

 {kicker:"はじめに", h:"農業歴16年・年間100t規模を出荷", sub:"しかも労働は朝9時〜14時。人を雇う仕組みで回しています。この実績をもとに、農業で結果を出したい方へ指導をしています。",
  note:"農業歴は16年、年間100トン規模を出荷しています。しかも労働は朝9時から14時で終わり、人を雇う仕組みで回しています。この実績をもとに、今、農業で結果を出したい方に向けて、指導をしています。今日はその時間です。"},

 {kicker:"はじめに", h:"僕は&ldquo;継いだ農家&rdquo;じゃない。ゼロから始めた1代目です", sub:"今のすごい農家は、ほとんどが親から継いだ人。僕は継ぐ地盤がなく、16年前にゼロから始めました。だから、これから始める人・今しんどい人の気持ちが分かります。",
  note:"少しだけ、僕の話をさせてください。僕は継いだ農家じゃないんです。今のすごい農家は、ほとんどが親から継いだ人。僕は継ぐ地盤がなくて、16年前にゼロから始めた1代目です。だから、これから始める人や、今しんどい人の気持ちが分かります。"},

 {kicker:"はじめに", h:"最初は、売り先から作ろうとして順番を間違えました", sub:"飛び込み営業もしました。でも出せる量が半分になって、取引先に電話するのが怖くて手が震えた。人参はほぼ腐らせ、補助金は生活費に消えた。順番が、逆だったんです。",
  note:"始めた頃、僕はまず売り先から作ろうとして、飛び込み営業もしました。でも出せる量が半分になって、取引先に電話するのが怖くて手が震えた。人参はほぼ腐らせて、補助金は生活費に消えた。今思えば、順番が逆だったんです。"},

 {kicker:"はじめに", h:"9割が辞めていく。分けたのは&ldquo;才能&rdquo;じゃなかった", sub:"僕と同じ新規就農者の9割は辞めます。横で始めた人も消えていった。違いは、才能でも天候でも規模でもない。利益が出るところまで、学び続け・やり続けられたか。それだけでした。",
  note:"僕と同じ新規就農者の9割は辞めます。横で始めた人も、どんどん消えていった。何が違ったか。才能でも天候でも規模でもない。利益が出るところまで、学び続けて、やり続けられたか。ただ、それだけでした。"},

 {kicker:"はじめに", h:"気づけば、トップクラスの農家からも&ldquo;どうやってるの&rdquo;と", sub:"ゼロから積み上げたやり方は、気づけば日本一の出荷量を誇るトップクラスの方からも「それ、どうやってるの。教えてほしい」と言われるレベルに。この続けられる仕組みを、あなたにも渡したい。",
  note:"そうやって続けていたら、僕のやり方は、気づけば、日本一の出荷量を誇るトップクラスの方からも、それ、どうやってるの、教えてほしい、と言われるレベルになっていました。この続けられる仕組みを、これから始めるあなたにも渡したい。だから、この活動をしています。"},

 {kicker:"はじめに", h:"今日のゴール", pts:["今どの段階にいるかを整理する","利益が残らない原因を見つける","次の一手を3つに絞る"],
  note:"ゴールは3つ。今の段階を整理／利益が残らない原因を見つける／次の一手を3つに絞る。これが明確になるだけで動きやすくなります。"},
 {kicker:"はじめに", h:"今日の進め方", sub:"まず質問、そのあと必要なら解決策。合わなければ無理に案内しません。役に立てる時だけ提案します。",
  note:"まず質問をいくつか。そのあと必要なら解決策をお伝えします。合わないと判断したら無理に案内はしません。役に立てる時だけ提案します。"},

 {kicker:"確認", h:"岸さんの状況、確認させてください", pts:["宮城・亘理町／畑まで30分・農地20坪","副業スタート前・作物は未定・家族と","資金20万・目標 年100万／身体を壊さない範囲で","いちばんの悩み＝「作った物をどう売るか」"],
  note:"まず確認から入ります。一から聞き直しません。ヒアリングシートと、前にお話しした内容も含めて、この理解で合っていますか。ズレていたら、ここで直してください。合っていれば、その先を一緒に深掘りします。"},
 {kicker:"確認して深掘り", h:"売り先、頭にある候補はありますか", sub:"道の駅／直売所／知人／JA／マルシェ…なんとなくでも、イメージしているものはありますか。",
  note:"“作った物をどう売るか”が一番の悩みでしたね。今、頭にある売り先の候補はありますか。道の駅・直売所・知人・JAなど、なんとなくでも大丈夫です。"},
 {kicker:"確認して深掘り", h:"亘理で、ご近所が作ってる・売れてるもの", sub:"周りで何が動いているか、見ていますか。そこに“売れる作物”のヒントがあります。",
  note:"作物は未定とのことでしたね。亘理でご近所が作っているもの・売れているものは何か見ていますか。そこから逆算すると、作る物が決まってきます。"},
 {kicker:"確認して深掘り", h:"週にどれくらい、畑に出られそう", sub:"家族と・身体を壊さない範囲で、が大事。無理なく続く時間の見立てを一緒に。",
  note:"“身体を壊さない範囲で、家族と”は大事にしたいところですね。週にどれくらい畑に出られそうですか。無理なく続く形から設計します。"},

 {kicker:"ポイント", h:"その解決策、興味はありますか？", sub:"今必要なのは「作る技術だけ」ではなく、選ばれ続ける仕組みを作ること。",
  note:"【テストクロージング①】今必要なのは作る技術だけでなく、選ばれ続ける仕組みです。その解決策、興味はありますか？ 「はい」を得てから次へ進みます。"},

 {kicker:"考え方", h:"農業で伸び悩む、本当の原因", sub:"努力不足ではありません。作ることに集中しすぎて、売る前提の設計が後回しになっているだけ。",
  note:"伸び悩みは努力不足ではありません。作ることに集中しすぎて、売る前提の設計が後回しになっているだけです。"},
 {kicker:"考え方", h:"作る技術だけでは、伸びない", sub:"良いものを作るのは大事です。でも誰に選ばれ・どう買われ・どう続くかまで設計して初めて利益が残ります。",
  note:"良いものを作るのは大事です。でもそれだけでは利益は安定しません。設計して初めて利益が残ります。"},
 {kicker:"考え方", h:"順番は「安定 → 売り先 → 拡大」", sub:"順番を間違えると苦しくなります。まず安定、次に売り先、最後に拡大です。",
  note:"順番を間違えると苦しくなります。まず安定して作る、次に売り先、最後に拡大です。"},
 {kicker:"考え方", h:"いきなり拡大してはいけない理由", sub:"売り先がないまま広げると、作業だけ増えて利益が残りません。拡大の前に、価格と数量が安定する流れを作ります。",
  note:"売り先がないまま規模を広げると作業だけ増えて利益が残りません。拡大の前に価格と数量が安定する流れを作ります。"},

 {kicker:"実績", h:"1日実働 約5時間で、年間100t超", sub:"農業歴16年の1代目専業農家。根性ではなく、仕組みで安定させています。指導者である私自身が、月商200万も達成しています。",
  note:"農業歴16年の1代目専業農家です。年間100t超を1日実働約5時間で出しています。根性でなく仕組みです。指導者として自分が月商200万を達成している＝成果を出している証拠があります。"},
 {kicker:"実績", h:"大不作の年でも、3日で1ヶ月分を回収", sub:"2024年の大不作でも、3日間で1ヶ月分の売上を回収。運ではなく、作る前・売る前・届ける前の仕組み。",
  note:"2024年の大不作でも3日間で1ヶ月分の売上を回収しました。運でなく、作る前・売る前・届ける前の仕組みがあったからです。"},
 {kicker:"実績", h:"有機JASニンジン産地化と表彰", sub:"愛知初の有機JASニンジン産地化／3年連続で別作物の表彰／発芽率70%→95%以上、高値出荷。",
  note:"愛知初の有機JASニンジン産地化、3年連続表彰、発芽率70→95%以上、高値出荷。順番と改善の積み重ねです。"},

 /* ===== 信頼性強化：相談者の声（全文・匿名/仮名/実名の指定厳守） ===== */
 {kicker:"相談者の声", h:"1年前、ゼロから始めた方", sub:"※表記は匿名です",
  quote:"今まで私はデパートの営業をしていたんですけど、親の土地を相続したのがきっかけで、体力的にもきつくて、農業で生活していくしかないなと思ったんです。最初は自然農をやろうと思っていました。でも自然農や有機で野菜をやっている方に会っても、どうやって稼ぐかを教えてくれる人がいなかったんです。自然農の哲学はすごいけど、経営の話になると急に曖昧になる。具体的な売上の作り方が出てこない。そこがずっと不安でした。",
  note:"1年前にゼロから始めた受講生の方の声（匿名）です。きっかけと、稼ぎ方を教えてくれる人がいなかった不安の代弁です。"},
 {kicker:"相談者の声", h:"補助金は、当てにするのをやめた", sub:"※匿名",
  quote:"補助金も、実際に話を聞いたら条件に合わなくて、結局使わないので、当てにすることをやめました。",
  note:"補助金は多くの方が考えますが、条件が合わないこともあります。補助金依存からの脱却です。"},
 {kicker:"相談者の声", h:"現場で学べた、という安心感", sub:"※匿名",
  quote:"このハウスを建てるまでの半年、イチローさんが栽培している“今年から私がやる作物”を触って、出荷までやってみて、リアルに学べたのが大きかったです。イチローさんが失敗した話を全部してくれたから、失敗してもどう建て直すかが分かる、という安心感がありました。",
  note:"知識だけでなく現場で学べたという声です。うまくいった話だけでなく失敗まで共有＝伴走の価値・信頼です。"},
 {kicker:"相談者の声", h:"数字で見る力がついた", sub:"※匿名",
  quote:"実際に出荷作業をしてみて、この品質の商品を何ケース作ればいいか、いくらになるかが具体的に分かりました。地域トップの方は1坪で1.5箱つくれる、という基準があって、自分がどれだけ作れて、トップとの差がどのくらいあるかを“測定”できるようになったのが大きいです。数字で見るって、稼げるようになる最初のステップなんだと実感しました。",
  note:"感覚でなく数字で見ます。地域トップ＝1坪1.5箱（※1株でなく1坪）。トップとの差を測定できる＝稼げる最初のステップです。"},
 {kicker:"相談者の声", h:"農業は「続けていく」仕事", sub:"※匿名",
  quote:"何も知らない初心者が、一人じゃ全然できないと思いました。農業って“作る”っていう仕事じゃなくて、“続けていく”っていう仕事なんだと分かりました。",
  note:"独学の限界・伴走の必要性を語る声です。"},
 {kicker:"相談者の声", h:"委託で、出荷をスタート", sub:"※匿名",
  quote:"この半年、イチローさんの現場で学んできたので、今年はこのハウスで花の出荷を“委託”でスタートします。イチローさんの出荷先ネットワークを使わせてもらって、出荷に出す品質にする練習をしてきました。この半年で、売れるレベルの品質を作る感覚をつかめました。",
  note:"現場学習から実行へ。売れる品質の感覚をつかみ、委託で出荷開始まで進みます。"},
 {kicker:"相談者の声", h:"100万 → 300万 → 1000万", sub:"※匿名",
  quote:"まずは売上100万を出すのが第一目標です。次に300万円、その先には年間1000万円まで。“100万を達成すると300万が見えるようになってくる”と教わりました。最初は100万なんて全然無理でした。でも、一緒に学んだことをやれば、自然と100万いっちゃうので。",
  note:"いきなり1000万でなく、100万→300万→1000万の階段です。※これは受講生本人の言葉です。こちらから「稼げる保証」はしません。"},
 {kicker:"相談者の声", h:"「この人がいけるなら、私もいけるかも」", sub:"※匿名",
  quote:"実際に、イチローさんが売っているのを見ているから、“売り上げいけるんだ”って実感できます。“この人がいけるなら、私もいけるかも”って。“農業しかない”という気合いしかなかった私が、先の見通しを立てて、ハウスまで建てられたのは、一郎さんのおかげです。やると決めたら、意外と早かったです。",
  note:"社会的証明・行動喚起です。実際にできている人と接すると景色が変わります。"},
 {kicker:"相談者の声", h:"理想の働き方", sub:"※匿名",
  quote:"働く時間も9時から2時って理想的です。でも、やるべき時には時間を無視してとにかくやることも分かりました。時間のメリハリも大事ですね。",
  note:"短く働くだけでなく、やる時はやる・抜く時は抜くメリハリがあります。ライフスタイル訴求です。"},

 {kicker:"相談者の声", h:"何を作るか、決まっていなかった方", sub:"※がっしーさん（本人希望の仮名）",
  quote:"今自分がどうしたいのかをまとめて、それからかなと思って。本当こういう機会をいただいたので本当にありがたいなと思いました。",
  note:"作物・方向が未定タイプへの安心です。"},
 {kicker:"相談者の声", h:"売り先がなくて、不安だった方", sub:"※ブドウを作っている方（匿名）",
  quote:"品物の安定を図ってから、それから自分で販路拡大を考えた方がいいのかな、というところまで、ふわっと整理できました。“もう1ライン作ればいい”という話が新しい発見でした。",
  note:"販路不安タイプへの安心です。順番と具体策が整理できています。"},
 {kicker:"相談者の声", h:"利益設計で悩んでいた方", sub:"※鈴木さん（実名OK）",
  quote:"まだ始めてもいない段階なので、まず安定させることが一番だなと。認定を取らないとブランド化も難しいのかなと気づきました。（質疑で費用や認定業者の選び方まで質問し）全部答えてもらえたのでとてもよくわかりました。",
  note:"スタート前から利益設計で悩む方が、疑問を解消しています。※鈴木さんのみ実名OKです。"},
 {kicker:"相談者の声", h:"これから始めたい人が聞きたいこと", sub:"※たきたさん（使用OK）",
  quote:"みんなの感想を聞いていて思ったのは、これから農業を始めたい人が聞きたいことが全部詰まっていたんじゃないかと思いました。",
  note:"信頼性パートの締め・第三者評価です。"},

 {kicker:"利益が残る農業", h:"利益が残る、3つの要素", pts:["安定して作れる","買ってくれる相手がいる","利益が出る形で続く"],
  note:"必要なのは3つ。安定して作れる／買ってくれる相手がいる／利益が出る形で続く。順番に整えます。"},

const stage=document.getElementById('stage');
S.forEach((s,i)=>{
  const d=document.createElement('div');
  d.className='slide'+(s.cls?(' '+s.cls):'');
  let inner='';
  if(s.kicker) inner+=`<div class="kicker">${s.kicker}</div>`;
  inner+=`<h1>${s.h}</h1>`;
  if(s.sub) inner+=`<div class="sub">${s.sub}</div>`;
  if(s.quote) inner+=`<div class="quote">「${s.quote}」</div>`+(s.subq?'':'');
  if(s.sub&&s.quote){}
  if(s.pts){inner+='<ul class="pts">'+s.pts.map(p=>`<li>${p}</li>`).join('')+'</ul>';}
  if(s.tag) inner+=`<div class="tag">${s.tag}</div>`;
  if(s.who) inner+=`<div class="who">${s.who}</div>`;
  inner+=`<div class="foot">稼げる農業の仕組み化 伴走プログラム</div>`;
  d.innerHTML=inner;
  d.dataset.note=s.note||'';
  stage.appendChild(d);
});
let cur=0;const slides=[...document.querySelectorAll('.slide')];
const counter=document.getElementById('counter');
const noteBox=document.getElementById('note');let noteOn=false;
function show(i){cur=Math.max(0,Math.min(slides.length-1,i));
  slides.forEach((s,k)=>s.classList.toggle('active',k===cur));
  counter.textContent=(cur+1)+' / '+slides.length;
  if(noteOn){noteBox.innerHTML='<b>🎙 トーク台本（発表者のみ）：</b> '+(slides[cur].dataset.note||'—');}
}
(function(){var sx=0;
document.addEventListener('touchstart',function(e){sx=e.changedTouches[0].clientX;},{passive:true});
document.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40){show(dx<0?cur+1:cur-1);}},{passive:true});
document.addEventListener('click',function(e){if(e.target.closest('#note,#counter,a,button'))return;show(e.clientX>window.innerWidth/2?cur+1:cur-1);});})();
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){show(cur+1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){show(cur-1);}
  else if(e.key.toLowerCase()==='n'){noteOn=!noteOn;noteBox.classList.toggle('show',noteOn);show(cur);}
  else if(e.key==='Home'){show(0);}else if(e.key==='End'){show(slides.length-1);}
});
stage.addEventListener('click',()=>show(cur+1));
const _h=parseInt((location.hash||'').slice(1),10);
show(isNaN(_h)?0:_h);
</script>
